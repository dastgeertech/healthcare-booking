services:
  - type: web
    name: healthcare-booking-api
    runtime: python
    repo: https://github.com/dastgeertech/healthcare-booking
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
        value: https://healthcare-booking-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: healthcare-db
    plan: free
    databaseName: healthcare
    user: postgres
